services:
  # The Database Service
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: aviation_db
    env_file:
      - .env.docker
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Your Python App Service
  tracker:
    build: .
    container_name: flight_logic_engine
    depends_on:
      - db
    env_file:
      - .env.app
    environment:
      - DB_HOST=db
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
    volumes:
      - ./app:/app  # Live-sync code so you can edit while it runs!
      - ./data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: flight_pgadmin
    env_file:
      - .env.docker
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data:

